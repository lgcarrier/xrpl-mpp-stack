[build-system]
requires = ["editables>=0.5", "hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "xrpl-mpp-middleware"
version = "0.1.3"
description = "ASGI middleware for XRPL-backed MPP HTTP payments"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.12"
license = "MIT"
authors = [
  { name = "Louis-Guillaume Carrier-Bedard", email = "lgcarrier@gmail.com" },
]
keywords = ["xrpl", "mpp", "middleware", "fastapi", "payments"]
classifiers = [
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Topic :: Internet :: WWW/HTTP",
  "Typing :: Typed",
]
dependencies = [
  "httpx==0.28.1",
  "pydantic>=2,<3",
  "starlette>=0.37,<1",
  "xrpl-mpp-core>=0.1.3,<0.2.0",
]

[project.urls]
Documentation = "https://lgcarrier.github.io/xrpl-mpp-stack/packages/middleware/"
Source = "https://github.com/lgcarrier/xrpl-mpp-stack/tree/main/packages/middleware"
Issues = "https://github.com/lgcarrier/xrpl-mpp-stack/issues"
Changelog = "https://github.com/lgcarrier/xrpl-mpp-stack/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/xrpl_mpp_middleware"]

[tool.hatch.build.hooks.custom]
path = "build_hook.py"

[tool.hatch.build.targets.wheel.force-include]
"LICENSE" = "LICENSE"

[tool.hatch.build.targets.sdist]
include = [
  "/src/xrpl_mpp_middleware",
  "/README.md",
  "/LICENSE",
  "/build_hook.py",
]
